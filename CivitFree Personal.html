<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CivitFree Personal — Local AI Generation</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg-canvas: #0b0d12;
    --panel: #14171f;
    --panel-2: #1a1e28;
    --panel-3: #222735;
    --line: #262b39;
    --line-soft: #1d212c;
    --text: #e7e9ee;
    --text-dim: #9ba1b0;
    --text-mute: #6b7185;

    --accent: oklch(0.68 0.22 340);          /* magenta primary */
    --accent-soft: oklch(0.32 0.12 340 / .25);
    --accent-line: oklch(0.55 0.18 340 / .55);

    --cyan: oklch(0.78 0.13 220);
    --cyan-soft: oklch(0.40 0.10 220 / .22);

    --warn: oklch(0.78 0.16 70);
    --good: oklch(0.78 0.14 165);
    --bad: oklch(0.65 0.20 25);

    --radius: 10px;
    --radius-sm: 6px;
    --font-ui: 'Inter', system-ui, -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
    --font-display: 'Instrument Serif', 'Times New Roman', serif;
  }

  html, body { margin: 0; background: #efece6; font-family: var(--font-ui); color: var(--text); }
  * { box-sizing: border-box; }
  button { font: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }
  input, textarea, select { font: inherit; color: inherit; }

  /* App-shell shared frame */
  .cf-frame {
    width: 390px;
    height: 780px;
    background: var(--bg-canvas);
    color: var(--text);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    border-radius: 28px;
    isolation: isolate;
    font-size: 14px;
  }
  .cf-frame.dense { font-size: 13px; }

  .cf-statusbar {
    height: 36px; padding: 0 18px 0 22px;
    display: flex; align-items: center; justify-content: space-between;
    font-family: var(--font-mono); font-size: 12px; font-weight: 600;
    color: var(--text);
    flex-shrink: 0;
  }
  .cf-statusbar .right { display: flex; gap: 6px; align-items: center; }
  .cf-dot { width: 4px; height: 4px; border-radius: 50%; background: currentColor; opacity: .7; }

  /* Topbar */
  .cf-topbar {
    height: 56px; padding: 0 14px;
    display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .cf-logo {
    width: 38px; height: 38px; border-radius: 10px;
    background: linear-gradient(155deg, oklch(0.42 0.16 340), oklch(0.30 0.12 290));
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 700; font-size: 13px; font-family: var(--font-mono);
    position: relative; flex-shrink: 0;
    box-shadow: inset 0 0 0 1px oklch(0.62 0.18 340 / .5), 0 6px 14px -8px oklch(0.55 0.20 340 / .9);
  }
  .cf-logo::after {
    content: none;
  }
  .cf-icon-btn {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim);
    transition: background .12s, color .12s;
  }
  .cf-icon-btn:hover { background: var(--panel-2); color: var(--text); }
  .cf-icon-btn.active { background: var(--panel-3); color: var(--text); }
  .cf-topbar-spacer { flex: 1; }
  .cf-toggle-pill {
    width: 36px; height: 20px; border-radius: 999px;
    background: var(--panel-3); position: relative; cursor: pointer;
    transition: background .18s;
  }
  .cf-toggle-pill::before {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--text-dim); transition: left .18s, background .18s;
  }
  .cf-toggle-pill.on { background: var(--accent-soft); box-shadow: inset 0 0 0 1px var(--accent-line); }
  .cf-toggle-pill.on::before { left: 18px; background: var(--accent); }

  /* Body scroll area */
  .cf-body {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    scrollbar-width: thin; scrollbar-color: var(--panel-3) transparent;
  }
  .cf-body::-webkit-scrollbar { width: 4px; }
  .cf-body::-webkit-scrollbar-thumb { background: var(--panel-3); border-radius: 4px; }

  /* Bottom dock */
  .cf-dock {
    flex-shrink: 0;
    padding: 10px 14px 16px;
    background: linear-gradient(180deg, transparent, var(--bg-canvas) 30%);
    border-top: 1px solid var(--line);
  }
  .cf-dock-row1 {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 4px 10px; font-size: 12px;
  }
  .cf-queue-bar { display: flex; gap: 3px; align-items: center; }
  .cf-queue-bar .seg { width: 6px; height: 4px; border-radius: 1.5px; background: var(--panel-3); }
  .cf-queue-bar .seg.lit { background: var(--accent); }
  .cf-link { color: var(--cyan); font-weight: 500; cursor: pointer; }
  .cf-breakdown { color: var(--warn); font-weight: 500; display: flex; align-items: center; gap: 4px; cursor: pointer; }

  .cf-dock-row2 { display: flex; gap: 8px; align-items: stretch; }
  .cf-qty {
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    width: 64px; padding: 6px 8px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative; cursor: pointer;
  }
  .cf-qty .num { font-size: 18px; font-weight: 600; font-family: var(--font-mono); }
  .cf-qty .lbl { font-size: 9px; letter-spacing: .12em; color: var(--text-mute); margin-top: 2px; }
  .cf-qty .arrows { position: absolute; right: 4px; top: 6px; display: flex; flex-direction: column; gap: 1px; color: var(--text-dim); }

  .cf-generate {
    flex: 1;
    background: linear-gradient(180deg, oklch(0.74 0.22 340), oklch(0.62 0.22 340));
    color: white; font-weight: 700; font-size: 16px; letter-spacing: -0.01em;
    border-radius: 12px; padding: 14px 12px;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    box-shadow: inset 0 1px 0 oklch(0.92 0.10 340 / .5), 0 8px 20px -12px oklch(0.55 0.20 340);
    transition: transform .08s;
    position: relative; overflow: hidden;
  }
  .cf-generate:active { transform: translateY(1px); }
  .cf-generate .price {
    position: absolute; right: 12px; display: flex; align-items: center; gap: 2px;
    font-size: 13px; font-family: var(--font-mono); opacity: .9;
  }
  .cf-generate .price svg { width: 12px; height: 12px; }

  .cf-history-btn {
    width: 48px; border-radius: 12px;
    background: var(--panel); border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim);
  }

  /* Sections */
  .cf-section { padding: 16px 16px 4px; }
  .cf-section + .cf-section { padding-top: 18px; }
  .cf-section.divided { border-top: 1px solid var(--line-soft); margin-top: 16px; }
  .cf-section-title {
    font-size: 13px; font-weight: 600; letter-spacing: -0.005em;
    display: flex; align-items: center; gap: 6px;
    margin: 0 0 10px;
  }
  .cf-section-title .info { width: 13px; height: 13px; opacity: .5; }
  .cf-section-title .req { color: var(--bad); margin-left: -2px; }
  .cf-section-title .right { margin-left: auto; display: flex; align-items: center; gap: 6px; color: var(--cyan); font-weight: 500; cursor: pointer; }

  /* Form parts */
  .cf-textarea, .cf-input {
    width: 100%; background: var(--panel); border: 1px solid var(--line);
    border-radius: 10px; padding: 11px 12px;
    color: var(--text); font-size: 14px; font-family: var(--font-ui);
    resize: vertical; transition: border-color .12s, background .12s;
  }
  .cf-textarea:focus, .cf-input:focus { outline: none; border-color: var(--accent-line); background: var(--panel-2); }
  .cf-textarea::placeholder, .cf-input::placeholder { color: var(--text-mute); }
  .cf-textarea { min-height: 84px; line-height: 1.45; }

  /* Chips (segmented presets) */
  .cf-chips { display: flex; gap: 6px; }
  .cf-chip {
    padding: 6px 12px; font-size: 12px; font-weight: 500;
    border-radius: 8px; color: var(--text-dim);
    background: var(--panel-2); border: 1px solid transparent;
    transition: all .12s; cursor: pointer; white-space: nowrap;
  }
  .cf-chip:hover { color: var(--text); background: var(--panel-3); }
  .cf-chip.active { background: var(--accent); color: white; border-color: oklch(0.78 0.20 340); box-shadow: 0 0 0 1px oklch(0.50 0.18 340 / .4); }
  .cf-chip.active.cyan { background: var(--cyan); border-color: oklch(0.85 0.12 220); color: oklch(0.18 0.02 220); }

  /* Slider */
  .cf-slider-row { display: flex; align-items: center; gap: 12px; }
  .cf-slider {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 4px; background: var(--panel-3); border-radius: 2px;
    outline: none; cursor: pointer;
  }
  .cf-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px; border-radius: 50%;
    background: white; box-shadow: 0 0 0 2px var(--accent), 0 2px 6px rgba(0,0,0,.3);
    cursor: grab;
  }
  .cf-slider::-moz-range-thumb {
    width: 16px; height: 16px; border-radius: 50%; border: 0;
    background: white; box-shadow: 0 0 0 2px var(--accent), 0 2px 6px rgba(0,0,0,.3);
  }
  .cf-num-input {
    width: 64px; background: var(--panel); border: 1px solid var(--line);
    border-radius: 8px; padding: 6px 8px;
    font-family: var(--font-mono); font-size: 13px; text-align: left;
    display: flex; align-items: center; justify-content: space-between;
  }
  .cf-num-input .arrows { display: flex; flex-direction: column; gap: 1px; color: var(--text-dim); }

  /* Aspect ratio cards */
  .cf-ratio-row { display: flex; gap: 10px; }
  .cf-ratio {
    flex: 1; padding: 14px 6px 10px; border-radius: 10px;
    background: var(--panel-2); border: 1px solid var(--line);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    cursor: pointer; transition: all .15s;
  }
  .cf-ratio.active { background: var(--panel-3); border-color: var(--cyan); box-shadow: inset 0 0 0 1px var(--cyan-soft); }
  .cf-ratio .frame { background: var(--panel-3); border: 1px solid var(--line); border-radius: 3px; }
  .cf-ratio.active .frame { background: var(--bg-canvas); border-color: var(--cyan); }
  .cf-ratio .label { font-size: 13px; font-weight: 600; color: var(--text); }
  .cf-ratio .px { font-size: 10px; font-family: var(--font-mono); color: var(--text-mute); }

  /* Tabs */
  .cf-tabs {
    display: flex; gap: 0; background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; padding: 4px;
  }
  .cf-tabs-scroll {
    overflow-x: auto;
    scrollbar-width: none;
  }
  .cf-tabs-scroll::-webkit-scrollbar { display: none; }
  .cf-tabs-scroll .cf-tab { flex: 0 0 auto; }
  .cf-tab {
    flex: 1; padding: 10px 12px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 13px;
    color: var(--text-dim); cursor: pointer; transition: all .15s;
  }
  .cf-tab.active { background: var(--panel-3); color: var(--text); box-shadow: 0 0 0 1px var(--accent-line); }

  .cf-modality {
    display: flex; gap: 8px; align-items: center; padding: 4px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
  }
  .cf-modality .mod-tabs { display: flex; gap: 2px; padding-right: 4px; border-right: 1px solid var(--line); }
  .cf-modality .mod-tab {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim); cursor: pointer; transition: all .12s;
  }
  .cf-modality .mod-tab.active { background: var(--accent-soft); color: var(--accent); }
  .cf-modality .mode-pill { flex: 1; padding: 0 10px; display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; height: 36px; }
  .cf-modality .mode-pill .badge {
    font-size: 9px; letter-spacing: .14em; font-weight: 700;
    background: var(--cyan-soft); color: var(--cyan); padding: 3px 6px; border-radius: 4px;
    font-family: var(--font-mono);
  }

  /* Card-like rows */
  .cf-card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 12px;
  }
  .cf-card.collapsible .head { display: flex; align-items: center; cursor: pointer; }
  .cf-card.collapsible .head .ttl { font-weight: 600; font-size: 14px; }
  .cf-card.collapsible .head .chev { margin-left: auto; color: var(--text-dim); transition: transform .2s; }
  .cf-card.collapsible.collapsed .body { display: none; }
  .cf-card.collapsible.collapsed .head .chev { transform: rotate(180deg); }
  .cf-card.collapsible .body { padding-top: 4px; display: flex; flex-direction: column; gap: 18px; }

  /* Model card */
  .cf-model {
    display: flex; gap: 12px; align-items: center;
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 10px;
  }
  .cf-model .thumb {
    width: 48px; height: 48px; border-radius: 8px;
    background: linear-gradient(135deg, oklch(0.32 0.10 290), oklch(0.18 0.06 320));
    position: relative; flex-shrink: 0; overflow: hidden;
    box-shadow: inset 0 0 30px oklch(0.50 0.20 320 / .25);
  }
  .cf-model .thumb::before {
    content: 'HSXL'; position: absolute; bottom: 3px; left: 4px;
    font-family: var(--font-mono); font-size: 8px; font-weight: 700;
    color: oklch(0.85 0.18 60); text-shadow: 0 0 4px oklch(0.6 0.20 60);
  }
  .cf-model .meta { flex: 1; min-width: 0; }
  .cf-model .name {
    color: var(--cyan); font-weight: 600; font-size: 14px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .cf-model .ver { color: var(--text-mute); font-size: 11px; font-family: var(--font-mono); margin-top: 2px; }
  .cf-model .swap {
    background: var(--cyan-soft); color: var(--cyan);
    padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;
  }

  /* Random / Custom toggle */
  .cf-pill-toggle {
    display: inline-flex; background: var(--panel); border: 1px solid var(--line);
    border-radius: 8px; padding: 2px;
  }
  .cf-pill-toggle button {
    padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; color: var(--text-dim);
  }
  .cf-pill-toggle button.on { background: var(--panel-3); color: var(--text); }

  /* Output settings chips */
  .cf-out-row { display: flex; gap: 6px; }
  .cf-out-chip {
    padding: 7px 10px; border-radius: 8px; font-size: 12px; font-weight: 500;
    background: var(--panel); border: 1px solid var(--line);
    display: flex; align-items: center; gap: 6px; cursor: pointer;
  }
  .cf-out-chip .strike { text-decoration: line-through; opacity: .55; }
  .cf-out-chip .bolt { color: var(--warn); }

  /* Add resources */
  .cf-add-block {
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 12px; display: flex; flex-direction: column; gap: 12px;
  }
  .cf-add-empty { color: var(--text-mute); font-size: 13px; padding: 8px 0; }

  /* VAE button */
  .cf-action-btn {
    width: 100%; padding: 12px;
    background: oklch(0.22 0.04 240 / .6);
    border: 1px dashed oklch(0.45 0.10 240 / .55);
    border-radius: 10px; color: var(--cyan);
    display: flex; align-items: center; justify-content: center; gap: 8px;
    font-weight: 600; font-size: 13px; cursor: pointer;
  }

  /* Notice/checkbox row */
  .cf-notice { display: flex; gap: 12px; padding: 4px 0; }
  .cf-checkbox {
    width: 18px; height: 18px; border: 1.5px solid var(--line); border-radius: 4px;
    flex-shrink: 0; margin-top: 2px;
  }
  .cf-notice .nm { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
  .cf-notice .desc { font-size: 12px; color: var(--text-dim); line-height: 1.45; }

  /* Run card */
  .cf-run-card {
    margin: 12px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
  }
  .cf-run-card .head {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--line-soft);
  }
  .cf-run-card .count-pill {
    display: flex; align-items: center; gap: 5px;
    padding: 4px 8px; border-radius: 8px;
    background: oklch(0.40 0.10 165 / .25); color: var(--good);
    font-size: 11px; font-family: var(--font-mono); font-weight: 600;
  }
  .cf-run-card .time { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); }
  .cf-run-card .status {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px dashed var(--good);
    animation: cf-spin 2s linear infinite;
  }
  @keyframes cf-spin { to { transform: rotate(360deg); } }
  .cf-run-card .head .actions { margin-left: auto; display: flex; gap: 8px; color: var(--text-dim); }
  .cf-run-card .head .actions .danger { color: var(--bad); }

  .cf-run-card .body { padding: 10px 12px 12px; }
  .cf-tag {
    display: inline-block; padding: 3px 8px; border-radius: 4px;
    font-size: 10px; font-weight: 700; letter-spacing: .12em;
    background: oklch(0.32 0.12 290 / .35); color: oklch(0.80 0.18 290);
    margin-bottom: 8px; font-family: var(--font-mono);
  }
  .cf-run-card .promptline {
    font-size: 12px; line-height: 1.5; color: var(--text-dim);
    overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    margin-bottom: 8px; cursor: pointer;
  }
  .cf-run-card .promptline.expanded {
    -webkit-line-clamp: unset; display: block;
  }
  .cf-run-card .promptline .more { color: var(--cyan); font-weight: 600; }

  .cf-resource {
    display: flex; align-items: center; gap: 8px;
    background: var(--panel-2); border: 1px solid var(--line);
    border-radius: 8px; padding: 6px 8px 6px 10px;
    font-size: 12px; margin-bottom: 6px;
  }
  .cf-resource .name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cf-resource .add {
    width: 22px; height: 22px; border-radius: 5px;
    background: var(--panel-3); display: flex; align-items: center; justify-content: center;
    color: var(--text-dim);
  }

  .cf-feed-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    position: relative;
  }
  .cf-feed-card .img {
    aspect-ratio: 2/3; position: relative;
    background: var(--panel-3);
  }
  .cf-feed-card .check {
    position: absolute; top: 8px; left: 8px;
    width: 18px; height: 18px; border-radius: 4px;
    border: 1.5px solid rgba(255,255,255,.7);
    background: rgba(0,0,0,.45); backdrop-filter: blur(6px);
  }
  .cf-feed-card .more {
    position: absolute; top: 8px; right: 8px;
    width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
    color: white;
  }
  .cf-feed-card .actions {
    display: flex; gap: 0; padding: 6px 4px;
    color: var(--text-dim);
    justify-content: space-evenly;
  }
  .cf-feed-card .actions::-webkit-scrollbar { display: none; }
  .cf-feed-card .actions button {
    flex: 0 0 auto; width: 30px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    color: inherit; transition: color .12s;
  }
  .cf-feed-card .actions button:hover { color: var(--text); }
  .cf-feed-card .actions button.liked { color: var(--accent); }

  .cf-sort-row {
    display: flex; align-items: center; gap: 16px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--line-soft);
    font-size: 13px;
  }
  .cf-sort-row .item { display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .cf-sort-row .item.muted { color: var(--text-dim); }
  .cf-sort-row .right { margin-left: auto; display: flex; align-items: center; gap: 8px; color: var(--text-dim); }
  .cf-sort-row .checkbox {
    width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid var(--line);
  }

  /* Aspect ratio frames different sizes */
  .frame-23 { width: 16px; height: 24px; }
  .frame-11 { width: 22px; height: 22px; }
  .frame-32 { width: 24px; height: 16px; }

  /* Gallery */
  .cf-gallery-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
    padding: 4px 12px 4px;
  }
  .cf-gen-card {
    border-radius: 10px; overflow: hidden; position: relative;
    background: var(--panel-3);
    aspect-ratio: 2/3;
  }
  .cf-gen-card.r1 { aspect-ratio: 1/1; }
  .cf-gen-card.r3 { aspect-ratio: 3/4; }
  .cf-gen-card .layer {
    position: absolute; inset: 0;
  }
  .cf-gen-card .meta {
    position: absolute; left: 8px; bottom: 8px; right: 8px;
    display: flex; align-items: center; justify-content: space-between;
    font-family: var(--font-mono); font-size: 10px; color: rgba(255,255,255,.85);
    text-shadow: 0 1px 4px rgba(0,0,0,.7);
  }
  .cf-gen-card .seedtag { background: rgba(0,0,0,.55); padding: 3px 6px; border-radius: 4px; backdrop-filter: blur(8px); }
  .cf-gen-card .heart {
    position: absolute; top: 8px; right: 8px;
    width: 26px; height: 26px; border-radius: 50%;
    background: rgba(0,0,0,.45); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 12px;
  }
  .cf-gen-card .heart.liked { color: var(--accent); }

  /* Run header */
  .cf-run-head {
    padding: 14px 16px 8px; display: flex; align-items: baseline; gap: 8px;
  }
  .cf-run-head .when { color: var(--text-mute); font-family: var(--font-mono); font-size: 11px; }
  .cf-run-head .prompt { color: var(--text); font-size: 13px; font-weight: 500; flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cf-run-head .reuse { color: var(--cyan); font-size: 11px; font-weight: 600; }

  .cf-progress-card {
    margin: 10px 12px; padding: 14px;
    background: var(--panel); border: 1px solid var(--accent-line); border-radius: 12px;
    display: flex; flex-direction: column; gap: 10px;
    background-image:
      radial-gradient(circle at 0% 0%, oklch(0.45 0.18 340 / .15), transparent 60%),
      radial-gradient(circle at 100% 100%, oklch(0.45 0.18 220 / .12), transparent 60%);
  }
  .cf-progress-card .row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
  .cf-progress-card .lbl { font-weight: 600; }
  .cf-progress-card .pct { font-family: var(--font-mono); color: var(--text-dim); }
  .cf-progress-card .bar { height: 4px; background: var(--panel-3); border-radius: 2px; overflow: hidden; position: relative; }
  .cf-progress-card .bar > i {
    position: absolute; inset: 0 60% 0 0;
    background: linear-gradient(90deg, var(--accent), var(--cyan));
    border-radius: 2px;
  }
  .cf-progress-card .small { font-size: 11px; font-family: var(--font-mono); color: var(--text-mute); display: flex; justify-content: space-between; }

  /* Inpaint canvas */
  .cf-paint {
    margin: 12px; aspect-ratio: 3/4; border-radius: 14px;
    overflow: hidden; position: relative;
    background: var(--panel-3);
  }
  .cf-paint .toolbar {
    position: absolute; left: 10px; right: 10px; bottom: 10px;
    display: flex; gap: 6px; padding: 6px;
    background: rgba(11,13,18,.7); backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 12px;
  }
  .cf-paint .tool {
    flex: 1; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim); transition: all .12s;
  }
  .cf-paint .tool.active { background: var(--accent); color: white; }
  .cf-paint .topbar {
    position: absolute; top: 10px; left: 10px; right: 10px;
    display: flex; gap: 6px; align-items: center;
  }
  .cf-paint .pill {
    background: rgba(11,13,18,.7); backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 8px; padding: 6px 10px; font-size: 11px;
    font-family: var(--font-mono); color: var(--text);
    display: flex; align-items: center; gap: 6px;
  }
  .cf-paint .strength {
    position: absolute; left: 10px; right: 10px; bottom: 60px;
    background: rgba(11,13,18,.7); backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 12px; padding: 8px 12px;
    display: flex; align-items: center; gap: 10px;
    font-size: 11px; color: var(--text-dim); font-family: var(--font-mono);
  }

  /* Bottom sheet */
  .cf-sheet-backdrop {
    position: absolute; inset: 0; z-index: 50;
    background: rgba(0,0,0,.55);
    display: flex; align-items: flex-end;
    animation: cf-fade-in .15s ease-out;
  }
  @keyframes cf-fade-in { from { opacity: 0; } }
  .cf-sheet {
    width: 100%;
    background: var(--panel);
    border-top: 1px solid var(--line);
    border-radius: 16px 16px 0 0;
    padding: 0 0 16px;
    max-height: 70%;
    overflow-y: auto;
    animation: cf-slide-up .2s ease-out;
  }
  @keyframes cf-slide-up { from { transform: translateY(100%); } }
  @keyframes cf-drawer-in { from { transform: translateX(-100%); } to { transform: translateX(0); } }
  .cf-sheet-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: var(--panel-3); margin: 10px auto 8px;
  }
  .cf-sheet-title {
    padding: 4px 16px 12px;
    font-size: 14px; font-weight: 600; font-family: var(--font-mono);
    color: var(--text-dim);
    border-bottom: 1px solid var(--line-soft);
  }
  .cf-sheet-body { padding: 4px 0; }
  .cf-sheet-section { padding: 4px 0; }
  .cf-sheet-section + .cf-sheet-section { border-top: 1px solid var(--line-soft); }
  .cf-sheet-section-label {
    padding: 8px 16px 4px;
    font-size: 10px; font-weight: 700; letter-spacing: .12em;
    color: var(--text-mute); text-transform: uppercase;
  }
  .cf-sheet-item {
    display: flex; align-items: center; gap: 12px;
    width: 100%; padding: 12px 16px;
    font-size: 14px; color: var(--text);
    transition: background .1s;
  }
  .cf-sheet-item svg { flex-shrink: 0; }
  .cf-sheet-item:hover { background: var(--panel-2); }
  .cf-sheet-item.danger { color: var(--bad); }

  /* utility */
  .row { display: flex; align-items: center; gap: 8px; }
  .row.between { justify-content: space-between; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .stack-sm { display: flex; flex-direction: column; gap: 8px; }
  .label { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .label .info { width: 13px; height: 13px; color: var(--text-mute); }
  .mono { font-family: var(--font-mono); }
  .dim { color: var(--text-dim); }
  .mute { color: var(--text-mute); }

  /* Notes annotation */
  .annot {
    font-family: var(--font-display); font-style: italic; font-size: 16px;
    color: rgba(40,30,20,.75); line-height: 1.35; max-width: 240px;
  }
  .annot small { font-family: var(--font-ui); font-style: normal; font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: rgba(80,70,60,.55); display: block; margin-bottom: 4px; }
</style>
</head>
<body>

<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="controls.jsx"></script>
<script type="text/babel" src="personal-mock-images.jsx"></script>
<script type="text/babel" src="variant-personal-classic.jsx"></script>
<script type="text/babel" src="bottom-sheet.jsx"></script>
<script type="text/babel" src="drawer.jsx"></script>
<script type="text/babel" src="model-picker.jsx"></script>
<script type="text/babel" src="sort-filter.jsx"></script>
<script type="text/babel" src="onboarding.jsx"></script>
<script type="text/babel" src="variant-personal-gallery.jsx"></script>
<script type="text/babel" src="variant-personal-inpaint.jsx"></script>
<script type="text/babel">
// Inlined app-personal — keep simple to avoid load timing issues
const PERSONAL_TWEAKS = /*EDITMODE-BEGIN*/{
  "accent": "#e056b3"
}/*EDITMODE-END*/;

function PersonalApp() {
  const [t, setTweak] = useTweaks(PERSONAL_TWEAKS);
  React.useEffect(() => {
    document.documentElement.style.setProperty('--accent', t.accent);
  }, [t.accent]);

  const removed = [
    ['Trophy / leaderboard icon', 'No community ranking'],
    ['Help icon', 'Replaced by tooltips / local docs'],
    ['Top-right toggle (Civitai-specific)', 'Not relevant outside that platform'],
    ['Bolt-credit pricing on Generate', 'No shared GPU economy'],
    ['Strikethrough promo (+⚡10)', 'No platform discounts'],
    ['"BUZZ" cost on run cards', 'No credit accounting'],
    ['"View queue" link', 'Your own queue is enough'],
    ['"Breakdown" cost popover', 'Nothing to itemize'],
    ['"Eco" tier badge on model row', 'No service tiering'],
    ['"Enhanced Compatibility" notice', 'No hosted engine versions'],
    ['Resources "0/12" quota', 'Local LoRAs are unlimited'],
    ['Model "Swap" → marketplace', 'Becomes local model picker'],
    ['"Enhance" prompt button', 'Needs an LLM — defer until you set one up'],
  ];
  const kept = [
    'Bookmark icon (presets — not community)',
    'Heart / wand / download per image',
    'Run cards grouping prompt + LoRAs + outputs',
    'Sort / Filter / Select all bar',
  ];
  const added = [
    'GPU + VRAM + temperature in the dock',
    'Realtime ETA in seconds (no credit cost)',
    'Model file size + "loaded" status on the model card',
    'Local file paths in the inpaint editor',
    '"Local pipeline" label instead of brand tier',
  ];

  return (
    <>
      <DesignCanvas>
        <DCSection
          id="personal"
          title="CivitFree · Personal"
          subtitle="Local-first build — no community feed, no credits, no platform tiering"
        >
          <DCArtboard id="p-classic" label="A · Generation panel" width={420} height={840}>
            <div style={{display:'flex', justifyContent:'center', padding:'15px 0'}}>
              <VariantPersonalClassic/>
            </div>
          </DCArtboard>
          <DCArtboard id="p-queue" label="B · Queue / runs" width={420} height={840}>
            <div style={{display:'flex', justifyContent:'center', padding:'15px 0'}}>
              <VariantPersonalQueue/>
            </div>
          </DCArtboard>
          <DCArtboard id="p-feed" label="C · All images feed" width={420} height={840}>
            <div style={{display:'flex', justifyContent:'center', padding:'15px 0'}}>
              <VariantPersonalFeed/>
            </div>
          </DCArtboard>
          <DCArtboard id="p-inpaint" label="D · Inpainting editor" width={420} height={840}>
            <div style={{display:'flex', justifyContent:'center', padding:'15px 0'}}>
              <VariantPersonalInpaint/>
            </div>
          </DCArtboard>
        </DCSection>

        <DCSection id="onboarding" title="Onboarding · First Run" subtitle="Two-step setup: connect backend → scan resources → pick default model">
          <DCArtboard id="onboard-1" label="Step 1 · Connect" width={420} height={840}>
            <div style={{display:'flex', justifyContent:'center', padding:'15px 0'}}>
              <OnboardingFrame step={1}/>
            </div>
          </DCArtboard>
          <DCArtboard id="onboard-2" label="Step 2 · Scan & Pick" width={420} height={840}>
            <div style={{display:'flex', justifyContent:'center', padding:'15px 0'}}>
              <OnboardingFrame step={2}/>
            </div>
          </DCArtboard>
        </DCSection>

        <DCSection id="diff" title="What's removed for personal use" subtitle="Mapping each cut back to its community reason">
          <DCArtboard id="legend" label="Cuts & additions" width={540} height={640}>
            <div style={{padding: 24, fontFamily: 'Inter, system-ui', fontSize: 13, lineHeight: 1.55, color: '#2a251f'}}>
              <div style={{fontWeight: 700, fontSize: 18, marginBottom: 14, letterSpacing:'-0.01em'}}>Removed in Personal</div>
              <table style={{width:'100%', borderCollapse:'collapse'}}>
                <tbody>
                  {removed.map(([k, v]) => (
                    <tr key={k} style={{borderTop:'1px solid rgba(0,0,0,.08)'}}>
                      <td style={{padding:'8px 0', verticalAlign:'top', width:'48%', fontWeight: 500}}>{k}</td>
                      <td style={{padding:'8px 0', verticalAlign:'top', color:'rgba(60,50,40,.7)'}}>{v}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <div style={{marginTop: 20, fontWeight: 700, fontSize: 14, marginBottom: 8}}>Kept (with reframe)</div>
              <ul style={{margin: 0, paddingLeft: 18, color:'rgba(60,50,40,.8)', marginBottom: 16}}>
                {kept.map(a => <li key={a}>{a}</li>)}
              </ul>
              <div style={{fontWeight: 700, fontSize: 14, marginBottom: 8}}>Added for Personal</div>
              <ul style={{margin: 0, paddingLeft: 18, color:'rgba(60,50,40,.8)'}}>
                {added.map(a => <li key={a}>{a}</li>)}
              </ul>
            </div>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel>
        <TweakSection label="Theme"/>
        <TweakColor label="Accent" value={t.accent} onChange={v => setTweak('accent', v)}/>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PersonalApp/>);
</script>

</body>
</html>
